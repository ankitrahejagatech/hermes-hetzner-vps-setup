<svg width="960" height="560" viewBox="0 0 960 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Hermes setup model selection screenshot</title>
  <desc id="desc">A terminal-style screenshot showing the Hermes setup model path: OpenAI, Codex, Authenticate, gpt 5.4 mini.</desc>
  <rect width="960" height="560" rx="18" fill="#101317"/>
  <rect x="28" y="28" width="904" height="504" rx="12" fill="#171B21" stroke="#303743"/>
  <circle cx="56" cy="54" r="7" fill="#FF5F57"/>
  <circle cx="80" cy="54" r="7" fill="#FFBD2E"/>
  <circle cx="104" cy="54" r="7" fill="#28C840"/>
  <text x="132" y="60" fill="#AAB4C0" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15">root@hermes-vps: ~</text>

  <text x="56" y="112" fill="#DCE3EA" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="20">$ hermes setup</text>
  <text x="56" y="154" fill="#8996A3" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="17">Choose your model provider</text>

  <rect x="56" y="178" width="848" height="58" rx="8" fill="#253246" stroke="#5B8DEF"/>
  <text x="84" y="214" fill="#FFFFFF" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="19">› OpenAI</text>

  <rect x="56" y="250" width="848" height="58" rx="8" fill="#20262E" stroke="#303743"/>
  <text x="84" y="286" fill="#DCE3EA" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="19">› Codex</text>

  <rect x="56" y="322" width="848" height="58" rx="8" fill="#20262E" stroke="#303743"/>
  <text x="84" y="358" fill="#DCE3EA" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="19">› Authenticate</text>

  <rect x="56" y="394" width="848" height="58" rx="8" fill="#20262E" stroke="#303743"/>
  <text x="84" y="430" fill="#DCE3EA" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="19">› gpt 5.4 mini</text>

  <text x="56" y="488" fill="#8EE6A8" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="17">Recommended for very low usage.</text>
  <text x="56" y="516" fill="#8996A3" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15">Later, ask Hermes in Telegram to change to another GPT model in a new session.</text>
</svg>
